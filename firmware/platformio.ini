[platformio]
default_envs = lilygo-t-display-s3

[env]
extra_scripts = pre:scripts/check_generated_config.py

[env:lilygo-t-display-s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

build_src_filter = +<*> +<../assets/fonts/>
build_flags =
    ; Include paths — permite #include "util/log.h" via "src/" sem prefix
    -Isrc

    ; Hardware
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OCT
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

    ; LVGL config flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    ; LV_COLOR_16_SWAP=1: LVGL emite bytes em big-endian, casando com a
    ; ordem que ST7789 espera. flush_cb usa draw16bitBeRGBBitmap.
    -DLV_COLOR_16_SWAP=1
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=1
    -DLV_USE_ANIMATION=1
    -DLV_USE_CANVAS=1
    -DLV_USE_SNAPSHOT=1
    ; LV_TICK_CUSTOM removido — chamamos lv_tick_inc(elapsed) manual em
    ; lvgl_setup::tick_ms, então default LVGL 9 (millis from tick_inc) basta.
    ; Aspas aninhadas em LV_TICK_CUSTOM_INCLUDE/SYS_TIME_EXPR quebram shell parser.
    -DLV_MEM_CUSTOM=1
    -DLV_MEM_SIZE=131072       ; 128 KB

    ; App debug
    -DDEBUG_LOG=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lvgl/lvgl@^9.2.0
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.1.0

[env:native]
platform = native
build_flags = -std=c++17 -DUNIT_TEST
test_framework = unity
