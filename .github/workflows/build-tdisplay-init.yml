name: Build & Push tdisplay-init image

# Dispara automaticamente em mudanças no init (Dockerfile + seed.sh) ou no
# workflow. Mudanças nos configs Telegraf/nginx vivem no repo
# `camarigor/camarigor-umbrel-store` — pra rebuild da imagem após mudar
# configs, rode manualmente: `gh workflow run build-tdisplay-init.yml`.
on:
  push:
    branches: [main]
    paths:
      - 'tdisplay-init/**'
      - '.github/workflows/build-tdisplay-init.yml'
  workflow_dispatch:
  repository_dispatch:
    types: [umbrel-store-configs-changed]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tdisplay-init

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout umbrel-store (seed configs source)
        uses: actions/checkout@v4
        with:
          repository: camarigor/camarigor-umbrel-store
          path: umbrel-store-checkout
          ref: main

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=1.1.0,enable={{is_default_branch}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tdisplay-init/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
