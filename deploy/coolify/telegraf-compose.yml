# =============================================================================
#  telegraf-compose.yml — Coolify "Resource from Git Repository"
#
#  Deploy via Coolify UI:
#    New Resource → Docker Compose → from Git Repository
#      Repository: https://github.com/camarigor/lilygo-t-display-s3
#      Branch:     main
#      Compose:    deploy/coolify/telegraf-compose.yml
#
#  Coolify clona o repo em /data/coolify/applications/<id>/source/ e roda
#  `docker compose -f deploy/coolify/telegraf-compose.yml up -d`. Como bind-mounts
#  relativos resolvem ao DIRETÓRIO do compose file (não CWD), o mount
#  `../telegraf/telegraf-system-docker.conf` aponta pra `deploy/telegraf/...`
#  no clone — config sempre em sync com o repo.
#
#  Env vars são configuradas via Coolify UI (Environment Variables tab):
#    TELEGRAF_HOSTNAME     id único do host (vira stats/<TELEGRAF_HOSTNAME>/*)
#                          NÃO use `HOSTNAME` — Docker sobrescreve a var com
#                          container ID em containers com network_mode: container:*
#    MQTT_HOST             broker IP/hostname (Tailscale interno, NÃO público)
#    MQTT_PORT             default 1883
#    MQTT_PASS_COLLECTOR   senha collector-<TELEGRAF_HOSTNAME> (marcar como secret)
#
#  Pinned image: telegraf:1.31-alpine
# =============================================================================

services:
  telegraf:
    image: telegraf:1.31-alpine
    container_name: telegraf-collector
    restart: on-failure
    stop_grace_period: 10s

    # ─── Hardening ────────────────────────────────────────────────────────────
    # Sem `cap_drop: ALL` — entrypoint do telegraf-alpine usa su-exec
    # (drop privs pra user telegraf) e setcap, ambos precisam de
    # CAP_SETUID/GID/FCAP. read_only + no-new-privileges + tmpfs já
    # garantem hardening mínimo.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

    # ─── Env (injetado pelo Coolify a partir da UI Environment Variables) ────
    environment:
      TELEGRAF_HOSTNAME: ${TELEGRAF_HOSTNAME}
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_PASS_COLLECTOR: ${MQTT_PASS_COLLECTOR}
      # Telegraf precisa de /host/{proc,sys,etc} pra ler do host (não namespace
      # do container). Sem isso, métricas cpu/mem/disk ficam erradas.
      HOST_PROC: "/host/proc"
      HOST_SYS: "/host/sys"
      HOST_ETC: "/host/etc"
      HOST_MOUNT_PREFIX: "/host"

    # ─── Volumes ──────────────────────────────────────────────────────────────
    # telegraf.conf vem de path absoluto host-managed (fora do clone do
    # Coolify) — sobrevive a recreates do resource. Operador faz scp do
    # template versionado em deploy/telegraf/telegraf-system-docker.conf
    # pro path abaixo. Updates do conf = re-scp + restart no Coolify.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/hostname:/host/etc/hostname:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/tdisplay-telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro

    # ─── Network ──────────────────────────────────────────────────────────────
    # Compartilha namespace de rede de um container Tailscale já rodando
    # (que tem subnet route ativa pra LAN do broker). Nome do container vem
    # de ${NETWORK_CONTAINER} (set via Coolify UI).
    #
    # Trade-off: se Coolify recriar esse container, o nome muda — atualize
    # a env var NETWORK_CONTAINER e re-deploy.
    network_mode: "container:${NETWORK_CONTAINER}"
