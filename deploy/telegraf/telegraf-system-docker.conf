# =============================================================================
#  telegraf-system-docker.conf — Telegraf 1.31 template (system + docker)
#
#  Use case: hosts com Docker (Coolify VPS, desktop dev, etc.).
#  Para hosts sem Docker, use `telegraf-system.conf`.
#
#  Resolução de variáveis: Telegraf substitui ${VAR} antes de parse TOML.
#  Defina via env_file (compose) ou environment inline:
#    HOSTNAME              identificador único (vira stats/<HOSTNAME>/*)
#    MQTT_HOST             broker IP/hostname
#    MQTT_PORT             porta (1883)
#    MQTT_PASS_COLLECTOR   senha do user collector-<HOSTNAME>
#
#  Mounts requeridos (no compose):
#    /proc:/host/proc:ro
#    /sys:/host/sys:ro
#    /etc/hostname:/host/etc/hostname:ro
#    /var/run/docker.sock:/var/run/docker.sock:ro
#
#  E environment do container (não vem do env_file):
#    HOST_PROC=/host/proc
#    HOST_SYS=/host/sys
#    HOST_ETC=/host/etc
#    HOST_MOUNT_PREFIX=/host
#  Sem isso, system/cpu/mem leem dos namespaces do container (errado).
#
#  Note: outputs.mqtt no Telegraf 1.31 NÃO suporta LWT (will). Detecção
#  offline é feita no firmware via timestamp staleness (~60s/~5min).
# =============================================================================

[agent]
  interval = "30s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  hostname = "${HOSTNAME}"
  omit_hostname = false

# ─── Inputs ──────────────────────────────────────────────────────────────────

[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = true

[[inputs.mem]]

[[inputs.disk]]
  mount_points = ["/"]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "overlay", "aufs", "squashfs"]

[[inputs.net]]
  ignore_protocol_stats = true

[[inputs.system]]

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  perdevice = false
  perdevice_include = ["cpu"]
  total_include = ["cpu", "blkio", "network"]

# ─── Outputs ─────────────────────────────────────────────────────────────────

[[outputs.mqtt]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topic = "stats/${HOSTNAME}/{{ .PluginName }}"
  protocol = "3.1.1"
  username = "collector-${HOSTNAME}"
  password = "${MQTT_PASS_COLLECTOR}"
  client_id = "telegraf-${HOSTNAME}"
  keep_alive = 60
  qos = 0
  retain = false
  data_format = "json"
  json_timestamp_units = "1s"
