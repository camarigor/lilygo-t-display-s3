# =============================================================================
#  telegraf-system.conf — Telegraf 1.31 template (system stats, NO docker)
#
#  Use case: hosts sem Docker (Linux nativo, e.g. systemd box, Pi).
#  Para hosts com Docker, use `telegraf-system-docker.conf` (mesmo template
#  + bloco [[inputs.docker]]).
#
#  Resolução de variáveis: Telegraf faz substituição de ${VAR} antes de
#  parse TOML. Defina via:
#    - systemd: EnvironmentFile=/etc/telegraf/telegraf.env  (chmod 600)
#    - docker:  env_file no compose, OU `environment:` inline
#
#  Variáveis requeridas:
#    TELEGRAF_HOSTNAME     identificador único do host (ex.: "host-a")
#                          → vira parte do tópico stats/<TELEGRAF_HOSTNAME>/* e do
#                            username MQTT collector-<TELEGRAF_HOSTNAME>
#                          NÃO use `HOSTNAME` (Docker sobrescreve com container ID
#                          em containers com network_mode: container:*).
#    MQTT_HOST             broker IP/hostname
#    MQTT_PORT             porta TCP do broker (1883 default)
#    MQTT_PASS_COLLECTOR   senha do user collector-<TELEGRAF_HOSTNAME>
#
#  Note: outputs.mqtt no Telegraf 1.31 NÃO suporta LWT (will). Detecção
#  offline é feita no firmware do display via timestamp staleness:
#  ~60s sem nova amostra = stale, ~5min = offline.
# =============================================================================

[agent]
  interval = "30s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  hostname = "${TELEGRAF_HOSTNAME}"
  omit_hostname = false

# ─── Inputs ──────────────────────────────────────────────────────────────────

[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = true

[[inputs.mem]]

[[inputs.disk]]
  mount_points = ["/"]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "overlay", "aufs", "squashfs"]

[[inputs.net]]
  ignore_protocol_stats = true

[[inputs.system]]

# ─── Outputs ─────────────────────────────────────────────────────────────────

[[outputs.mqtt]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topic = "stats/${TELEGRAF_HOSTNAME}/{{ .PluginName }}"
  protocol = "3.1.1"
  username = "collector-${TELEGRAF_HOSTNAME}"
  password = "${MQTT_PASS_COLLECTOR}"
  client_id = "telegraf-${TELEGRAF_HOSTNAME}"
  keep_alive = 60
  qos = 0
  retain = false
  data_format = "json"
  json_timestamp_units = "1s"
