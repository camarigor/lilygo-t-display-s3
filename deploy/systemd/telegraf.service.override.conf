# /etc/systemd/system/telegraf.service.d/override.conf
#
# Drop-in genérico pra qualquer Linux com systemd rodando o pacote oficial
# `telegraf` (apt do influxdata). Injeta env vars via EnvironmentFile e
# adiciona hardening.
#
# Instalado por `scripts/install-telegraf-systemd.sh`.

[Service]
# Reset upstream Environment/EnvironmentFile pra evitar double-loading
Environment=
EnvironmentFile=
EnvironmentFile=/etc/telegraf/telegraf.env

# Sanity: env file precisa existir + ter conteúdo antes de iniciar
ExecStartPre=/usr/bin/test -s /etc/telegraf/telegraf.env

# Limits
LimitNOFILE=65536

# ─── Hardening (systemd sandbox) ──────────────────────────────────────────────
NoNewPrivileges=true
ProtectSystem=strict
ProtectHome=true
PrivateTmp=true
PrivateDevices=true
ProtectKernelTunables=true
ProtectKernelModules=true
ProtectKernelLogs=true
ProtectControlGroups=true
RestrictNamespaces=true
RestrictRealtime=true
RestrictSUIDSGID=true
LockPersonality=true
SystemCallArchitectures=native
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6 AF_NETLINK

# ProtectSystem=strict torna /usr, /boot, /etc read-only. Telegraf escreve
# em /var/log/telegraf — concedendo write access apenas a isso.
ReadWritePaths=/var/log/telegraf

# MemoryDenyWriteExecute=yes desabilitado de propósito — Telegraf usa cgo
# e alguns plugins fazem JIT, o que quebra com essa flag.
